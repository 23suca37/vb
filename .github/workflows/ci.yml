name: Backend Sonar

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: mvn clean install

      - name: SonarCloud Scan
        run: mvn clean verify sonar:sonar -Dsonar.projectKey=23suca37_vb -Dsonar.organization=23suca37 -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
